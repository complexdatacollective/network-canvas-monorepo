name: Regenerate E2E Visual Snapshots

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Visual snapshot suite to regenerate
        required: true
        type: choice
        options:
          - architect
          - interview

permissions:
  contents: read

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - name: Regenerate Architect visual snapshots
        if: inputs.suite == 'architect'
        run: ./apps/architect/e2e/scripts/run.sh --grep @visual --update-snapshots

      - name: Regenerate Interview visual snapshots
        if: inputs.suite == 'interview'
        env:
          PW_WORKERS: 4
        run: >-
          ./packages/interview/e2e/scripts/run.sh
          --project=chromium-visual
          --project=firefox-visual
          --project=webkit-visual
          --update-snapshots

      - name: Reclaim snapshot ownership
        if: always()
        run: |
          sudo chown -R "$(id -u):$(id -g)" \
            apps/architect/e2e/visual-snapshots \
            packages/interview/e2e/visual-snapshots 2>/dev/null || true

      - name: Upload Architect visual snapshots
        if: success() && inputs.suite == 'architect'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: architect-visual-snapshots
          path: apps/architect/e2e/visual-snapshots/chromium/*.png
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload Interview visual snapshots
        if: success() && inputs.suite == 'interview'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: interview-visual-snapshots
          path: |
            packages/interview/e2e/visual-snapshots/chromium-matrix/
            packages/interview/e2e/visual-snapshots/firefox-matrix/
            packages/interview/e2e/visual-snapshots/webkit-matrix/
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
