name: Interview E2E

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [main]
    paths:
      - 'packages/interview/**'
      - 'packages/fresco-ui/**'
      - 'packages/protocol-validation/**'
      - 'packages/shared-consts/**'
      - 'packages/network-query/**'
      - 'tooling/tailwind/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/interview-e2e.yml'
  pull_request:
    paths:
      - 'packages/interview/**'
      - 'packages/fresco-ui/**'
      - 'packages/protocol-validation/**'
      - 'packages/shared-consts/**'
      - 'packages/network-query/**'
      - 'tooling/tailwind/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/interview-e2e.yml'
  workflow_dispatch:

concurrency:
  group: interview-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      outcome: ${{ steps.tests.outcome }}
      slug: ${{ steps.meta.outputs.slug }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute branch slug
        id: meta
        env:
          REF: ${{ github.head_ref || github.ref_name }}
        run: |
          SLUG=$(printf '%s' "$REF" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          printf 'slug=%s\n' "$SLUG" >> "$GITHUB_OUTPUT"

      - name: Run E2E tests
        id: tests
        continue-on-error: true
        run: ./packages/interview/e2e/scripts/run.sh

      - name: Reclaim artifact ownership
        if: always()
        run: |
          sudo chown -R "$(id -u):$(id -g)" \
            packages/interview/e2e/playwright-report \
            packages/interview/e2e/test-results 2>/dev/null || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interview-playwright-report
          path: packages/interview/e2e/playwright-report/
          if-no-files-found: warn
          retention-days: 14

  deploy-report:
    # Run on test pass or fail, but skip when e2e is cancelled (concurrency
    # interrupt or manual cancel) — there's no artifact to deploy and the
    # outputs are empty, so the job would just error out trying to download.
    if: ${{ !cancelled() && needs.e2e.result != 'cancelled' }}
    needs: e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      pull-requests: write
    concurrency:
      group: interview-e2e-pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: https://complexdatacollective.github.io/network-canvas-monorepo/interview-e2e/${{ needs.e2e.outputs.slug }}/
    steps:
      - name: Download new report
        uses: actions/download-artifact@v4
        with:
          name: interview-playwright-report
          path: new-report

      - name: Fetch existing pages content
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: existing-pages
        continue-on-error: true

      - name: Merge report into branch subdirectory
        env:
          SLUG: ${{ needs.e2e.outputs.slug }}
        run: |
          mkdir -p merged
          if [ -d existing-pages ] && [ "$(ls -A existing-pages 2>/dev/null)" ]; then
            cp -r existing-pages/. merged/
            rm -rf merged/.git
          fi
          rm -rf "merged/interview-e2e/$SLUG"
          mkdir -p "merged/interview-e2e/$SLUG"
          cp -r new-report/. "merged/interview-e2e/$SLUG/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: merged/

      - uses: actions/deploy-pages@v4

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          SLUG: ${{ needs.e2e.outputs.slug }}
          OUTCOME: ${{ needs.e2e.outputs.outcome }}
        with:
          script: |
            const { SLUG, OUTCOME } = process.env;
            const url = `https://complexdatacollective.github.io/network-canvas-monorepo/interview-e2e/${SLUG}/`;
            const emoji = OUTCOME === 'success' ? '✅' : '❌';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${emoji} Interview E2E — **${OUTCOME}**\n\n📊 [View report](${url})`,
            });

  result:
    # Same gate as deploy-report: only summarize the outcome when e2e
    # actually ran. A cancelled e2e leaves needs.e2e.outputs.outcome empty,
    # which would otherwise be misreported as a failure.
    if: ${{ !cancelled() && needs.e2e.result != 'cancelled' }}
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - name: Fail workflow if tests failed
        if: needs.e2e.outputs.outcome != 'success'
        run: exit 1
