name: Documentation Test Redirects

on:
  deployment_status

permissions:
  contents: read
  deployments: read

jobs:
  check_paths:
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.event.deployment_status.environment, 'preview') && github.event.deployment_status.state == 'success' && contains(github.event.deployment_status.environment_url, 'documentation')}}
    outputs:
      docs_changed: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0  # Fetch all history for proper path filtering

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            docs:
              - 'apps/documentation/**'

  test_redirects:
    needs: check_paths
    if: ${{ needs.check_paths.outputs.docs_changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version-file: '.nvmrc'

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8

      - name: Install dependencies
        working-directory: apps/documentation
        run: pnpm install --frozen-lockfile

      - name: Test redirects on preview deployment
        working-directory: apps/documentation
        env:
          DEPLOYMENT_URL: ${{ github.event.deployment_status.environment_url }}
        run: pnpm run test-redirects
