name: Chromatic

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [main]
    paths:
      - 'packages/fresco-ui/**'
      - 'packages/interview/**'
      - 'packages/protocol-validation/**'
      - 'packages/shared-consts/**'
      - 'packages/network-query/**'
      - 'tooling/tailwind/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/chromatic.yml'
  pull_request:
    paths:
      - 'packages/fresco-ui/**'
      - 'packages/interview/**'
      - 'packages/protocol-validation/**'
      - 'packages/shared-consts/**'
      - 'packages/network-query/**'
      - 'tooling/tailwind/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/chromatic.yml'
  workflow_dispatch:

concurrency:
  group: chromatic-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fresco-ui:
    name: fresco-ui
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          # Chromatic needs full history to detect baseline commits.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm --filter @codaco/fresco-ui^... build

      - name: Publish to Chromatic
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN_FRESCO_UI }}
          workingDir: packages/fresco-ui
          buildScriptName: build-storybook
          exitOnceUploaded: true
          autoAcceptChanges: main

  interview:
    name: interview
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm --filter @codaco/interview^... build

      - name: Publish to Chromatic
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN_INTERVIEW }}
          workingDir: packages/interview
          buildScriptName: build-storybook
          exitOnceUploaded: true
          autoAcceptChanges: main
