name: Open E2E Snapshot Update PR

on:
  workflow_run:
    workflows: ['CI and Release']
    types: [completed]

permissions: {}

jobs:
  open-snapshot-update:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'failure'
      && github.event.workflow_run.head_repository.full_name == github.repository
      && (github.event.workflow_run.event == 'pull_request'
      || github.event.workflow_run.event == 'workflow_dispatch')
      && (github.event.workflow_run.head_branch == 'changeset-release/main'
      || github.event.workflow_run.head_branch == 'changeset-release/apps') }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Validate the failing release PR
        id: source
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RELEASE_REF: ${{ github.event.workflow_run.head_branch }}
          RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const releaseRef = process.env.RELEASE_REF;
            const head = `${context.repo.owner}:${releaseRef}`;
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main',
              head,
              per_page: 10,
            });

            const source = pulls.find(
              (pull) =>
                pull.head.repo?.full_name === `${context.repo.owner}/${context.repo.repo}` &&
                pull.head.ref === releaseRef,
            );
            if (!source) {
              core.notice(`No open first-party release PR found for ${releaseRef}`);
              core.setOutput('current', 'false');
              return;
            }
            if (source.head.sha !== process.env.RUN_HEAD_SHA) {
              core.notice(
                `Ignoring stale run for ${process.env.RUN_HEAD_SHA}; ${releaseRef} is now ${source.head.sha}`,
              );
              core.setOutput('current', 'false');
              return;
            }

            const snapshotBranch =
              releaseRef === 'changeset-release/main'
                ? 'e2e-snapshots/changeset-release-main'
                : 'e2e-snapshots/changeset-release-apps';
            core.setOutput('current', 'true');
            core.setOutput('number', String(source.number));
            core.setOutput('url', source.html_url);
            core.setOutput('release_ref', releaseRef);
            core.setOutput('snapshot_branch', snapshotBranch);

      - name: Find generated snapshot artifacts
        id: artifacts
        if: steps.source.outputs.current == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const allowed = new Set([
              'e2e-visual-snapshots-architect',
              'e2e-visual-snapshots-interview',
              'e2e-visual-snapshots-interviewer',
            ]);
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.payload.workflow_run.id,
                per_page: 100,
              },
            );
            const candidates = artifacts.filter(
              (artifact) => allowed.has(artifact.name) && !artifact.expired,
            );
            core.setOutput('found', candidates.length > 0 ? 'true' : 'false');
            core.setOutput(
              'ids',
              candidates.map((artifact) => String(artifact.id)).join(','),
            );
            core.setOutput(
              'suites',
              candidates
                .map((artifact) => artifact.name.replace('e2e-visual-snapshots-', ''))
                .sort()
                .join(', '),
            );

      - name: Download generated snapshots
        if: steps.artifacts.outputs.found == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ steps.artifacts.outputs.ids }}
          path: ${{ runner.temp }}/snapshot-artifacts
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out the failing release revision
        if: steps.artifacts.outputs.found == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate and copy snapshot data
        id: changes
        if: steps.artifacts.outputs.found == 'true'
        env:
          ARTIFACT_ROOT: ${{ runner.temp }}/snapshot-artifacts
        run: |
          architect='^apps/architect/e2e/visual-snapshots/chromium/[A-Za-z0-9._-]+\.png$'
          interview='^packages/interview/e2e/visual-snapshots/(chromium|firefox|webkit)-matrix/[A-Za-z0-9._-]+\.png$'
          interviewer='^apps/interviewer/e2e/visual-snapshots/chromium/[A-Za-z0-9._-]+\.png$'

          unsafe=$(find "$ARTIFACT_ROOT" -mindepth 1 ! -type d ! -type f -print -quit)
          if [[ -n "$unsafe" ]]; then
            echo "::error::snapshot artifact contains a non-regular entry: $unsafe"
            exit 1
          fi

          count=$(find "$ARTIFACT_ROOT" -type f | wc -l | tr -d ' ')
          bytes=$(find "$ARTIFACT_ROOT" -type f -exec stat -c '%s' {} + | awk '{ total += $1 } END { print total + 0 }')
          if (( count == 0 || count > 500 || bytes > 209715200 )); then
            echo "::error::snapshot artifact limits exceeded: $count files, $bytes bytes"
            exit 1
          fi

          while IFS= read -r -d '' candidate; do
            relative=${candidate#"$ARTIFACT_ROOT"/}
            if [[ ! "$relative" =~ $architect && ! "$relative" =~ $interview && ! "$relative" =~ $interviewer ]]; then
              echo "::error::unexpected snapshot path: $relative"
              exit 1
            fi
            magic=$(od -An -t x1 -N8 "$candidate" | tr -d ' \n')
            if [[ "$magic" != '89504e470d0a1a0a' ]]; then
              echo "::error::snapshot does not have a PNG signature: $relative"
              exit 1
            fi
            mkdir -p "$(dirname "$GITHUB_WORKSPACE/$relative")"
            cp -- "$candidate" "$GITHUB_WORKSPACE/$relative"
          done < <(find "$ARTIFACT_ROOT" -type f -print0)

          changed=$(git status --porcelain=v1 --untracked-files=all)
          if [[ -z "$changed" ]]; then
            echo 'No baseline changes were generated.'
            echo 'found=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while IFS= read -r entry; do
            status=${entry:0:2}
            relative=${entry:3}
            if [[ "$status" != ' M' && "$status" != 'M ' && "$status" != '??' ]]; then
              echo "::error::unexpected git status '$status' for $relative"
              exit 1
            fi
            if [[ ! "$relative" =~ $architect && ! "$relative" =~ $interview && ! "$relative" =~ $interviewer ]]; then
              echo "::error::unexpected workspace change: $relative"
              exit 1
            fi
          done <<< "$changed"

          echo 'found=true' >> "$GITHUB_OUTPUT"

      - name: Confirm the release branch has not advanced
        id: current
        if: steps.changes.outputs.found == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RELEASE_REF: ${{ steps.source.outputs.release_ref }}
          RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${process.env.RELEASE_REF}`,
            });
            const current = ref.object.sha === process.env.RUN_HEAD_SHA;
            if (!current) {
              core.notice(
                `Skipping stale snapshot proposal; ${process.env.RELEASE_REF} is now ${ref.object.sha}`,
              );
            }
            core.setOutput('matches', current ? 'true' : 'false');

      - name: Open or update the snapshot PR
        id: snapshot_pr
        if: steps.current.outputs.matches == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ steps.source.outputs.release_ref }}
          branch: ${{ steps.source.outputs.snapshot_branch }}
          delete-branch: true
          add-paths: |
            apps/architect/e2e/visual-snapshots/
            apps/interviewer/e2e/visual-snapshots/
            packages/interview/e2e/visual-snapshots/
          commit-message: 'test(e2e): update visual baselines'
          title: 'test(e2e): update visual baselines for release PR #${{ steps.source.outputs.number }}'
          body: |
            The visual snapshot tests failed on ${{ steps.source.outputs.url }}.

            This PR contains only regenerated PNG baselines from the `${{ steps.artifacts.outputs.suites }}` suite(s). Merging it into `${{ steps.source.outputs.release_ref }}` accepts these baselines and automatically reruns the parent release PR.

            Source run: ${{ github.event.workflow_run.html_url }}

      - name: Link the snapshot PR from the release PR
        if: >-
          ${{ steps.snapshot_pr.outputs['pull-request-operation'] == 'created'
          || steps.snapshot_pr.outputs['pull-request-operation'] == 'updated' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SOURCE_PR: ${{ steps.source.outputs.number }}
          SNAPSHOT_PR: ${{ steps.snapshot_pr.outputs['pull-request-number'] }}
          SNAPSHOT_URL: ${{ steps.snapshot_pr.outputs['pull-request-url'] }}
        with:
          script: |
            const marker = '<!-- automated-e2e-snapshot-update -->';
            const body = `${marker}\nA visual E2E failure generated baseline PR #${process.env.SNAPSHOT_PR}: ${process.env.SNAPSHOT_URL}\n\nMerge that PR to accept the new PNG baselines and rerun this release PR.`;
            const issueNumber = Number(process.env.SOURCE_PR);
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const existing = comments.find(
              (comment) =>
                comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
            }
