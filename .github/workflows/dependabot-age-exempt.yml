name: Dependabot age-gate exempt

# When a Dependabot PR pins a dependency version younger than pnpm's
# minimumReleaseAge gate (24h — see pnpm-workspace.yaml), a plain
# `pnpm install --frozen-lockfile` fails and blocks the whole PR. This happens
# for *security* updates in particular: the Dependabot `cooldown` never delays
# them, so they open against a freshly published fix.
#
# This workflow adds the exact name@version entries the PR introduced to
# `minimumReleaseAgeExclude` so the reviewed bump can land immediately. The
# exemptions are narrow (only what this PR changed) and version-pinned (inert
# once the version ages past the gate). It runs only for Dependabot and only
# touches pnpm-workspace.yaml.
#
# SECURITY: this uses `pull_request_target` (needed to push the fix back to the
# Dependabot branch and access repo secrets). The `github.actor` guard is the
# safety boundary — only Dependabot's own PRs run here, and an external
# contributor cannot spoof that actor. No PR-authored code is executed
# (`--ignore-scripts`); the only PR-controlled inputs are the manifest and
# lockfile Dependabot itself wrote.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'pnpm-lock.yaml'

permissions:
  contents: write # push the exemption commit back to the Dependabot branch

concurrency:
  group: dependabot-age-exempt-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  exempt:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          # Check out the PR branch so the exemption commits to it. Dependabot
          # branches live in this repo, so the token can push back.
          #
          # A PAT/App token in DEPENDABOT_AUTOFIX_TOKEN is required for the
          # pushed commit to RE-TRIGGER CI — commits pushed with the default
          # GITHUB_TOKEN do not start new workflow runs. Without it the
          # exemption still lands, but CI needs a nudge (close/reopen the PR).
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.DEPENDABOT_AUTOFIX_TOKEN || github.token }}
          fetch-depth: 0 # full history so we can diff against the PR base
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Add age-gate exemption if the gate blocks this PR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: node .github/scripts/dependabot-age-exempt.mjs
      - name: Commit and push exemption
        run: |
          if git diff --quiet -- pnpm-workspace.yaml; then
            echo "No exemption needed."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pnpm-workspace.yaml
          git commit -m "chore(deps): exempt security bump from pnpm age gate

          Dependabot pinned a version newer than pnpm's minimumReleaseAge.
          Added the exact name@version to minimumReleaseAgeExclude so the
          reviewed update passes CI; the pin is inert once it ages out."
          git push
