name: Development Protocol Validate

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'packages/protocols/development/**'
      - 'packages/protocol-validation/**'
  push:
    paths:
      - 'packages/protocols/development/**'
      - 'packages/protocol-validation/**'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  validate:
    defaults:
      run:
        working-directory: ./packages/protocol-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: '.nvmrc'

      # Setup pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      # Build protocol-validation (its CLI reads its own dist; dependency types
      # resolve from src, so no dependency build is needed).
      - name: Build protocol validation
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Validate protocol
        run: node scripts/cli.js ../protocols/development/protocol.json
