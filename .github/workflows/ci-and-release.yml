name: CI and Release (Optimized)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read      # Allow reading repository contents
  packages: read      # Allow reading GitHub Packages
  actions: read       # Allow read-only access to workflow runs and jobs
  checks: write       # Allow updating check runs (needed for changesets/action)
  pull-requests: write # Allow creating pull requests (needed for changesets/action)

jobs:
  # Setup job that all other jobs depend on
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-consts
        run: pnpm --filter @codaco/shared-consts build

      - name: Build protocol-validation
        run: pnpm --filter @codaco/protocol-validation build

      # Upload shared-consts build as artifact
      - name: Upload shared-consts build
        uses: actions/upload-artifact@v7
        with:
          name: shared-consts-dist
          path: packages/shared-consts/dist
          retention-days: 1

      # Upload protocol-validation build as artifact
      - name: Upload protocol-validation build
        uses: actions/upload-artifact@v7
        with:
          name: protocol-validation-dist
          path: packages/protocol-validation/dist
          retention-days: 1

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download shared-consts build
        uses: actions/download-artifact@v4
        with:
          name: shared-consts-dist
          path: packages/shared-consts/dist

      - name: Download protocol-validation build
        uses: actions/download-artifact@v4
        with:
          name: protocol-validation-dist
          path: packages/protocol-validation/dist

      - name: Check formatting
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Knip
        run: pnpm knip

      - name: Validate redirects
        run: pnpm --filter @codaco/documentation validate-redirects

  test:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      PROTOCOL_ENCRYPTION_KEY: ${{ secrets.PROTOCOL_ENCRYPTION_KEY }}
      PROTOCOL_ENCRYPTION_IV: ${{ secrets.PROTOCOL_ENCRYPTION_IV }}
      GITHUB_TOKEN: ${{ secrets.TEST_PROTOCOL_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download shared-consts build
        uses: actions/download-artifact@v4
        with:
          name: shared-consts-dist
          path: packages/shared-consts/dist

      - name: Download protocol-validation build
        uses: actions/download-artifact@v4
        with:
          name: protocol-validation-dist
          path: packages/protocol-validation/dist

      - name: Install Playwright Chromium (for fresco-ui storybook tests)
        run: pnpm --filter @codaco/fresco-ui exec playwright install --with-deps chromium

      - name: Create .env file and run tests
        run: |
          echo "PROTOCOL_ENCRYPTION_KEY=${{ secrets.PROTOCOL_ENCRYPTION_KEY }}" > packages/protocol-validation/.env
          echo "PROTOCOL_ENCRYPTION_IV=${{ secrets.PROTOCOL_ENCRYPTION_IV }}" >> packages/protocol-validation/.env
          echo "GITHUB_TOKEN=${{ secrets.TEST_PROTOCOL_TOKEN }}" >> packages/protocol-validation/.env
          pnpm test

  release:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    # Only run on main branch pushes (not PRs) and only if lint and test jobs succeed
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [setup, lint, test]
    runs-on: ubuntu-latest
    environment: npm-publish
    env:
      NEXT_PUBLIC_DOCS_PATH: "docs"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
    steps:
    - name: Check out the code
      uses: actions/checkout@v6
    - name: Install pnpm
      uses: pnpm/action-setup@v5
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'pnpm'
    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Download shared-consts build
      uses: actions/download-artifact@v4
      with:
        name: shared-consts-dist
        path: packages/shared-consts/dist

    - name: Download protocol-validation build
      uses: actions/download-artifact@v4
      with:
        name: protocol-validation-dist
        path: packages/protocol-validation/dist

    # Build only packages with changesets
    - name: Build changed packages only
      run: pnpm run build:changed-packages

    # TEMPORARY: diagnose OIDC trusted publishing failure. Remove after.
    - name: Diagnose OIDC token exchange
      env:
        NPM_CONFIG_PROVENANCE: true
      run: |
        set +e

        echo "=== Manually exchange GitHub OIDC token with npm registry ==="
        # Mirrors what npm CLI's lib/utils/oidc.js does, but surfaces the
        # registry response body which npm CLI suppresses to verbose-only logs.
        ID_TOKEN=$(curl -fsSL \
          -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" \
          | jq -r '.value')
        echo "Got id_token (length): ${#ID_TOKEN}"

        echo ""
        echo "--- Decoded JWT payload (claims being sent to npm) ---"
        # JWT payload is base64url; pad and decode for visibility.
        payload=$(echo "$ID_TOKEN" | cut -d. -f2)
        case $(( ${#payload} % 4 )) in
          2) payload="${payload}==" ;;
          3) payload="${payload}=" ;;
        esac
        echo "$payload" | tr '_-' '/+' | base64 -d 2>/dev/null | jq '{
          repository, repository_owner, workflow_ref, ref,
          environment, job_workflow_ref, sub
        }'

        echo ""
        echo "--- Sending to npm token exchange for @codaco/network-query ---"
        curl -sS -X POST \
          -H "Authorization: Bearer ${ID_TOKEN}" \
          -H "Content-Type: application/json" \
          -w "\nHTTP %{http_code}\n" \
          "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/@codaco%2fnetwork-query"

        echo ""
        echo "--- Sending to npm token exchange for @codaco/development-protocol ---"
        curl -sS -X POST \
          -H "Authorization: Bearer ${ID_TOKEN}" \
          -H "Content-Type: application/json" \
          -w "\nHTTP %{http_code}\n" \
          "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/@codaco%2fdevelopment-protocol"

        echo ""
        echo "--- Sending to npm token exchange for @codaco/protocol-validation ---"
        curl -sS -X POST \
          -H "Authorization: Bearer ${ID_TOKEN}" \
          -H "Content-Type: application/json" \
          -w "\nHTTP %{http_code}\n" \
          "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/@codaco%2fprotocol-validation"

    - name: Create Release Pull Request
      uses: changesets/action@v1
      with:
        # command used to version packages. Lint and fix to avoid errors caused
        # by versioning
        version: pnpm run version-packages
        # Runs changesets publish. versioning is done by changesets action
        publish: pnpm run publish-packages
        createGithubReleases: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NPM_CONFIG_PROVENANCE: true
