name: CI and Release

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force package-scoped conditional checks to run regardless of change detection.'
        type: boolean
        default: false
      release_app:
        description: 'Force a legacy desktop app release (Architect/Interviewer) at the version currently in package.json, regardless of version-bump detection.'
        type: choice
        default: none
        options:
          - none
          - architect
          - interviewer
          - both

permissions:
  contents: read
  packages: read
  actions: read
  checks: write
  pull-requests: write

# PR runs are grouped per ref so a new push cancels the previous run for that
# branch. Push-to-main runs get a per-commit group instead: main pushes must
# never cancel each other, or a release-carrying run (the merge of a generated
# release PR) can be evicted while queued during a burst of merges and the release
# is silently lost. See .github/scripts/detect-app-release.sh for the self-healing
# safety net if a release run is dropped anyway.
concurrency:
  group: ci-${{ github.ref }}${{ github.event_name == 'push' && format('-{0}', github.sha) || '' }}
  # Cancel superseded feature-PR runs and explicitly dispatched release-branch
  # runs. Keep pull_request runs for the changesets bot's release PRs alive:
  # cancelling those leaves the required `quality` aggregate skipped and can
  # strand the PR. A release-branch dispatch targets a concrete branch head, so
  # a newer dispatch can safely replace an obsolete one.
  cancel-in-progress: >-
    ${{ (github.event_name == 'pull_request'
    && !startsWith(github.head_ref, 'changeset-release/'))
    || (github.event_name == 'workflow_dispatch'
    && (startsWith(github.ref_name, 'changeset-release/')
    || github.ref_name == 'e2e-snapshots/main')) }}

jobs:
  detect:
    if: github.event_name != 'merge_group'
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.flags.outputs.docs }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: '.nvmrc'
      - id: flags
        env:
          # Manual runs may set force_run=true to bypass package change
          # detection (replaces the old per-workflow rerun buttons).
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force_run == true }}
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          # Determine the comparison base — the commit range whose diff decides
          # which conditional jobs run. We DON'T use turbo-ignore because it
          # includes global config (turbo.json, lockfile, root configs) in its
          # hash, so any unrelated workflow tweak invalidates every package's
          # hash.
          #
          # PR semantics depend on the event action:
          #   - opened / reopened: no prior verdicts exist on this PR (or, for
          #     reopened, they may describe a stale base), so judge the
          #     CUMULATIVE PR diff — merge-base with the base branch to the PR
          #     tip. The tip's parent is NOT a safe stand-in: it only equals
          #     the base HEAD for single-commit branches, and a branch pushed
          #     with its commits already stacked would be judged on its tip
          #     commit alone (PR #890: a changeset-only tip skipped the
          #     architect preview on an architect-wide PR).
          #   - synchronize (subsequent pushes): push-to-push — diff only the
          #     latest push (prior branch commit → new tip) so only impacted
          #     jobs re-run; jobs that already ran keep their prior status via
          #     the carry-forward job below.
          #
          # GH Actions checks out a synthetic merge commit on PRs; HEAD^2 is
          # the actual PR tip.
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            CURR=$(git rev-parse HEAD^2 2>/dev/null || git rev-parse HEAD)
            if [[ "$EVENT_ACTION" == "synchronize" ]]; then
              PREV=$(git rev-parse "${CURR}^1" 2>/dev/null || true)
            else
              PREV=$(git merge-base "$CURR" "origin/${GITHUB_BASE_REF}" 2>/dev/null || true)
            fi
          else
            CURR=$(git rev-parse HEAD)
            PREV=$(git rev-parse HEAD^1 2>/dev/null || true)
          fi
          echo "comparing $PREV..$CURR (event action: ${EVENT_ACTION:-n/a})"

          # A change to this CI workflow itself can alter how any conditional job
          # behaves or whether it passes, so a prior run's verdict no longer
          # describes the new code. Treat a workflow change like FORCE_RUN for
          # package-scoped conditional jobs (E2E is release-gated separately), so
          # the carry-forward job below carries nothing stale forward for it.
          # Without this, a workflow-only commit leaves every package flag false
          # and republishes now-irrelevant prior verdicts against the new SHA.
          WORKFLOW_CHANGED=false
          if [[ -n "$PREV" ]] && ! git diff --quiet "$PREV" "$CURR" -- .github/workflows/ci-and-release.yml; then
            WORKFLOW_CHANGED=true
            echo "CI workflow changed in $PREV..$CURR — forcing all conditional jobs to run."
          fi

          # flag <package>: true if any file in the package's workspace dep
          # tree changed between PREV and CURR, false otherwise.
          flag() {
            local pkg=$1
            if [[ "$FORCE_RUN" == "true" || "$WORKFLOW_CHANGED" == "true" ]]; then
              echo true; return
            fi
            # First commit on a branch (no parent reachable) — be conservative
            # and run everything.
            if [[ -z "$PREV" ]]; then
              echo true; return
            fi
            local paths
            paths=$(npx --yes turbo@2.9.6 ls --filter="${pkg}..." --output=json 2>/dev/null \
              | jq -r '.packages.items[].path')
            local pathspec=()
            while IFS= read -r p; do
              [[ -n "$p" ]] && pathspec+=("$p")
            done <<<"$paths"
            if git diff --quiet "$PREV" "$CURR" -- "${pathspec[@]}"; then
              echo false
            else
              echo true
            fi
          }
          docs=$(flag @codaco/documentation)
          echo "docs=$docs" >> "$GITHUB_OUTPUT"

  e2e-policy:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    outputs:
      required: ${{ steps.policy.outputs.required }}
      release_ref: ${{ steps.policy.outputs.release_ref }}
      snapshot_branch: ${{ steps.policy.outputs.snapshot_branch }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: ${{ github.event_name == 'merge_group' && '0' || '1' }}
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: '.nvmrc'
      - name: Determine whether this ref triggers a release
        id: policy
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          BASE_SHA: ${{ github.event.merge_group.base_sha }}
          HEAD_SHA: ${{ github.event.merge_group.head_sha }}
        run: |
          policy=$(node scripts/release-e2e-policy.mjs)
          echo "release E2E policy: $policy"
          {
            echo "required=$(jq -r '.required' <<< "$policy")"
            echo "release_ref=$(jq -r '.releaseRef' <<< "$policy")"
            echo "snapshot_branch=$(jq -r '.snapshotBranch' <<< "$policy")"
          } >> "$GITHUB_OUTPUT"

  # Cache design: turbo-ci-setup runs a runner-local server speaking turbo's
  # remote-cache protocol, backed by the GitHub Actions Cache with per-task,
  # hash-addressed entries. Per-package env values (NEXT_PUBLIC_*, VITE_*) are
  # part of each build task's `env:` list in turbo.json so they participate in
  # the cache key. The lockfile is deliberately NOT in turbo.json's
  # `globalDependencies`: turbo hashes each package's resolved dependencies
  # (including pnpm catalog entries) granularly, so a dependency bump only
  # invalidates the packages that use it — listing pnpm-lock.yaml globally
  # would invalidate every task on every bump.
  #
  # GitHub's cache is branch-scoped: PR and merge-queue runs can restore main's
  # entries plus their own branch's, but entries written on ephemeral
  # merge-queue refs die with the ref, and the quality jobs skip `push` — so
  # without the `seed-turbo-cache` job below, main's tree would never have
  # cache entries and every run after a merge would re-run everything that
  # merge changed.
  #
  # `quality` used to be a single job running everything serially; it is now a
  # fan-out of independent sub-jobs behind the `quality` aggregator below, so
  # they run in parallel runners instead of one after another. Sub-jobs
  # deliberately do NOT `needs: detect` so they still run under `merge_group`
  # (where `detect` is skipped). `typecheck`/`test` restore `build`'s output via
  # their own `^build` dependency; `lint` needs it too (below) because oxlint's
  # type-aware rules resolve workspace imports through built `.d.ts` files.
  seed-turbo-cache:
    if: github.event_name == 'push'
    # Cache warming only — the merge queue already validated this identical
    # tree, so a flake here must not fail the push run (which also carries the
    # release jobs).
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/turbo-ci-setup
      - name: Write protocol-validation .env (test fixture)
        env:
          PROTOCOL_ENCRYPTION_KEY: ${{ secrets.PROTOCOL_ENCRYPTION_KEY }}
          PROTOCOL_ENCRYPTION_IV: ${{ secrets.PROTOCOL_ENCRYPTION_IV }}
          TEST_PROTOCOL_TOKEN: ${{ secrets.TEST_PROTOCOL_TOKEN }}
        run: |
          {
            echo "PROTOCOL_ENCRYPTION_KEY=$PROTOCOL_ENCRYPTION_KEY"
            echo "PROTOCOL_ENCRYPTION_IV=$PROTOCOL_ENCRYPTION_IV"
            echo "GITHUB_TOKEN=$TEST_PROTOCOL_TOKEN"
          } > packages/protocol-validation/.env
      - run: pnpm exec turbo run test typecheck

  lint:
    needs: build
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/turbo-ci-setup
      # Restore the shared-package builds (cache hit from the `build` job) so
      # oxlint-tsgolint has the workspace types; otherwise it emits false-positive
      # type errors (`//#lint` has no `^build` dependency of its own).
      - run: pnpm exec turbo run build --filter='./packages/*'
      - run: pnpm exec turbo run //#lint

  knip:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/turbo-ci-setup
      - run: pnpm exec turbo run //#knip

  check-changesets:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/turbo-ci-setup
      - run: pnpm check:changesets

  test-scripts:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/turbo-ci-setup
      - run: pnpm test:scripts

  build:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/turbo-ci-setup
      - name: Build shared packages (apps build in their own deploy/release jobs)
        run: pnpm exec turbo run build --filter='./packages/*'

  typecheck:
    needs: build
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/turbo-ci-setup
      - run: pnpm exec turbo run typecheck

  test:
    needs: build
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
          # `--affected` diffs against the PR base; on a shallow clone turbo
          # treats every package as changed.
          fetch-depth: 0
      - uses: ./.github/actions/turbo-ci-setup
      - name: Write protocol-validation .env (test fixture)
        env:
          PROTOCOL_ENCRYPTION_KEY: ${{ secrets.PROTOCOL_ENCRYPTION_KEY }}
          PROTOCOL_ENCRYPTION_IV: ${{ secrets.PROTOCOL_ENCRYPTION_IV }}
          TEST_PROTOCOL_TOKEN: ${{ secrets.TEST_PROTOCOL_TOKEN }}
        run: |
          {
            echo "PROTOCOL_ENCRYPTION_KEY=$PROTOCOL_ENCRYPTION_KEY"
            echo "PROTOCOL_ENCRYPTION_IV=$PROTOCOL_ENCRYPTION_IV"
            echo "GITHUB_TOKEN=$TEST_PROTOCOL_TOKEN"
          } > packages/protocol-validation/.env
      - name: Run tests (PRs run only packages affected by the PR diff)
        run: |
          # PR checkouts are a synthetic merge of the PR into its base, so
          # HEAD^1 is the base tip and --affected scopes the run to the
          # packages the PR touches plus their dependents. Anything skipped
          # here is still covered by the full merge-queue run before it can
          # land. A change to this workflow can alter how this job itself
          # behaves, so it falls back to the full suite (same rule as
          # detect's WORKFLOW_CHANGED).
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]] \
            && git diff --quiet HEAD^1 HEAD -- .github/workflows/ci-and-release.yml; then
            TURBO_SCM_BASE=$(git rev-parse HEAD^1) pnpm exec turbo run test --affected
          else
            pnpm exec turbo run test
          fi

  quality:
    needs:
      - lint
      - knip
      - check-changesets
      - test-scripts
      - build
      - typecheck
      - test
      - detect
      - e2e-policy
      - interview-e2e
      - interviewer-e2e
      - architect-e2e
    if: ${{ !cancelled() && github.event_name != 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify all quality checks passed
        env:
          EVENT_NAME: ${{ github.event_name }}
          DETECT_RESULT: ${{ needs.detect.result }}
          E2E_POLICY_RESULT: ${{ needs.e2e-policy.result }}
          E2E_REQUIRED: ${{ needs.e2e-policy.outputs.required }}
          LINT_RESULT: ${{ needs.lint.result }}
          KNIP_RESULT: ${{ needs.knip.result }}
          CHANGESETS_RESULT: ${{ needs.check-changesets.result }}
          SCRIPTS_RESULT: ${{ needs.test-scripts.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          TEST_RESULT: ${{ needs.test.result }}
          INTERVIEW_E2E_RESULT: ${{ needs.interview-e2e.result }}
          INTERVIEWER_E2E_RESULT: ${{ needs.interviewer-e2e.result }}
          ARCHITECT_E2E_RESULT: ${{ needs.architect-e2e.result }}
        run: |
          verify_successes() {
            local gate=$1
            shift
            echo "$gate results: $*"
            for r in "$@"; do
              if [ "$r" != "success" ]; then
                echo "::error::$gate failed — a sub-job concluded '$r'"
                exit 1
              fi
            done
          }

          verify_successes "quality gate" \
            "$LINT_RESULT" \
            "$KNIP_RESULT" \
            "$CHANGESETS_RESULT" \
            "$SCRIPTS_RESULT" \
            "$BUILD_RESULT" \
            "$TYPECHECK_RESULT" \
            "$TEST_RESULT"

          if [[ "$EVENT_NAME" != "merge_group" && "$DETECT_RESULT" != "success" ]]; then
            echo "::error::quality gate failed — detect concluded '$DETECT_RESULT'"
            exit 1
          fi

          if [[ "$E2E_POLICY_RESULT" != "success" ]]; then
            echo "::error::quality gate failed — E2E policy concluded '$E2E_POLICY_RESULT'"
            exit 1
          fi

          if [[ "$E2E_REQUIRED" == "true" ]]; then
            verify_successes "release E2E gate" \
              "$INTERVIEW_E2E_RESULT" \
              "$INTERVIEWER_E2E_RESULT" \
              "$ARCHITECT_E2E_RESULT"
          else
            echo "E2E gate is not required for this event"
          fi
          echo "quality gate passed"

  docs-preview-checks:
    needs: detect
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      needs.detect.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      statuses: read
    steps:
      - id: netlify-preview
        name: Wait for Netlify documentation preview
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const siteName = 'documentation-dev';
            const statusContext = `netlify/${siteName}/deploy-preview`;
            const headSha = context.payload.pull_request.head.sha;
            const expectedHost = `deploy-preview-${context.issue.number}--${siteName}.netlify.app`;
            const deadline = Date.now() + 15 * 60 * 1000;

            while (Date.now() < deadline) {
              const statuses = await github.paginate(
                github.rest.repos.listCommitStatusesForRef,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: headSha,
                  per_page: 100,
                },
              );
              const status = statuses.find(({ context }) => context === statusContext);

              if (status?.state === 'success') {
                let previewUrl;
                try {
                  previewUrl = new URL(status.target_url);
                } catch {
                  core.setFailed(`${statusContext} did not provide a valid preview URL`);
                  return;
                }

                if (previewUrl.protocol !== 'https:' || previewUrl.hostname !== expectedHost) {
                  core.setFailed(
                    `${statusContext} pointed to unexpected URL ${previewUrl.toString()}`,
                  );
                  return;
                }

                core.setOutput('url', previewUrl.origin);
                return;
              }

              if (status && ['error', 'failure'].includes(status.state)) {
                core.setFailed(`${statusContext} concluded ${status.state}`);
                return;
              }

              await new Promise((resolve) => setTimeout(resolve, 15_000));
            }

            core.setFailed(`Timed out waiting for ${statusContext}`);
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Confirm Netlify preview is reachable
        env:
          DOCS_URL: ${{ steps.netlify-preview.outputs.url }}
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -fsSL --max-time 10 -o /dev/null "$DOCS_URL/en"; then
              echo "deploy is reachable; proceeding"
              exit 0
            fi
            echo "attempt $i: not yet, sleeping 5s"
            sleep 5
          done
          echo "::error::Netlify documentation preview is not reachable at $DOCS_URL"
          exit 1
      - name: Dead-link check
        env:
          DOCS_URL: ${{ steps.netlify-preview.outputs.url }}
        # @jthrilly/dead-link-checker >=1.1.0 retries each request on transient
        # network errors (UND_ERR_SOCKET / connect timeouts), so a single flaky
        # fetch no longer fails the run. Retrying the whole crawl here was the
        # wrong layer — it multiplied exposure to the per-request flake instead
        # of recovering from it — so a single invocation is now correct.
        run: npx --yes @jthrilly/dead-link-checker@^1.1.0 "$DOCS_URL" -v --yes
      - name: Redirect test
        working-directory: apps/documentation
        env:
          DEPLOYMENT_URL: ${{ steps.netlify-preview.outputs.url }}
        run: pnpm run test-redirects

  interview-e2e:
    # Generated package/app release PRs run every E2E suite. The Dockerized
    # suite builds its own dependency graph and cannot consume the host runner's
    # Turbo cache, so start it as soon as the release policy completes.
    needs: e2e-policy
    if: ${{ !cancelled() && needs.e2e-policy.outputs.required == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Cap matrix parallelism on the GitHub runner. The config default ('50%')
      # both under-uses the box for the fully-parallel matrix projects and lets
      # the crypto-heavy Anonymisation scenarios (PBKDF2 at write time) contend
      # under high worker counts, which surfaces as spurious timeout flakes. 4 is
      # the measured sweet spot for the single-job (no shard matrix) run.
      PW_WORKERS: 4
    outputs:
      slug: ${{ steps.meta.outputs.slug }}
      snapshot_failure: ${{ steps.snapshot_failure.outputs.detected }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # The Dockerized test run mounts the workspace; don't leave the
          # checkout token in .git/config for test/build code to read.
          persist-credentials: false
      - id: meta
        env:
          REF: ${{ github.head_ref || github.ref_name }}
        run: |
          SLUG=$(printf '%s' "$REF" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          # Strip any chars that would break GitHub Pages URLs or filesystem paths.
          SLUG=$(printf '%s' "$SLUG" | tr -c '[:alnum:]-_.' '-')
          SLUG=${SLUG:-unknown}
          printf 'slug=%s\n' "$SLUG" >> "$GITHUB_OUTPUT"
      - name: Run E2E tests
        run: ./packages/interview/e2e/scripts/run.sh
      - name: Classify snapshot-only failure
        id: snapshot_failure
        if: failure()
        run: |
          detected=$(node scripts/playwright-snapshot-failure.mjs packages/interview/e2e/test-results/results.json)
          echo "snapshot-only failure: $detected"
          echo "detected=$detected" >> "$GITHUB_OUTPUT"
      # Dormant until a shard matrix is added (spec: enable shards only if the
      # single-job wall-clock exceeds the 45-minute budget). When enabling: add
      # strategy.matrix.shard, pass --shard=${{ matrix.shard }} to run.sh, set
      # PW_BLOB: 1, and give the merge step the downloaded per-shard blob dirs.
      - name: Set up sharded report merger
        if: ${{ env.PW_BLOB == '1' }}
        uses: ./.github/actions/turbo-ci-setup
      - name: Merge sharded blob reports
        if: ${{ env.PW_BLOB == '1' }}
        run: pnpm --filter @codaco/interview exec playwright merge-reports --reporter html ./blob-report
      - name: Reclaim artifact ownership
        if: always()
        run: |
          sudo chown -R "$(id -u):$(id -g)" \
            packages/interview/e2e/playwright-report \
            packages/interview/e2e/test-results 2>/dev/null || true
      - name: Flag flaky tests
        # Reporting only — never gate the job on it (belt-and-suspenders with the
        # script's own guards).
        if: always()
        continue-on-error: true
        run: node packages/interview/e2e/scripts/flaky-summary.mjs
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: interview-playwright-report
          path: packages/interview/e2e/playwright-report/
          if-no-files-found: warn
          retention-days: 14

  interviewer-e2e:
    # See interview-e2e: this Dockerized suite owns its build too.
    needs: e2e-policy
    if: ${{ !cancelled() && needs.e2e-policy.outputs.required == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      snapshot_failure: ${{ steps.snapshot_failure.outputs.detected }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # The Dockerized test run mounts the workspace; don't leave the
          # checkout token in .git/config for test/build code to read.
          persist-credentials: false
      - name: Run E2E tests
        run: ./apps/interviewer/e2e/scripts/run.sh
      - name: Classify snapshot-only failure
        id: snapshot_failure
        if: failure()
        run: |
          detected=$(node scripts/playwright-snapshot-failure.mjs apps/interviewer/e2e/test-results/results.json)
          echo "snapshot-only failure: $detected"
          echo "detected=$detected" >> "$GITHUB_OUTPUT"
      - name: Reclaim artifact ownership
        if: always()
        run: |
          sudo chown -R "$(id -u):$(id -g)" \
            apps/interviewer/e2e/playwright-report \
            apps/interviewer/e2e/test-results 2>/dev/null || true
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: interviewer-playwright-report
          path: apps/interviewer/e2e/playwright-report/
          if-no-files-found: warn
          retention-days: 14

  architect-e2e:
    # See interview-e2e: this Dockerized suite owns its build too.
    needs: e2e-policy
    if: ${{ !cancelled() && needs.e2e-policy.outputs.required == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      snapshot_failure: ${{ steps.snapshot_failure.outputs.detected }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # The Dockerized test run mounts the workspace; don't leave the
          # checkout token in .git/config for test/build code to read.
          persist-credentials: false
      - name: Run E2E tests
        run: ./apps/architect/e2e/scripts/run.sh
      - name: Classify snapshot-only failure
        id: snapshot_failure
        if: failure()
        run: |
          detected=$(node scripts/playwright-snapshot-failure.mjs apps/architect/e2e/test-results/results.json)
          echo "snapshot-only failure: $detected"
          echo "detected=$detected" >> "$GITHUB_OUTPUT"
      - name: Reclaim artifact ownership
        if: always()
        run: |
          sudo chown -R "$(id -u):$(id -g)" \
            apps/architect/e2e/playwright-report \
            apps/architect/e2e/test-results 2>/dev/null || true
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-architect
          path: apps/architect/e2e/playwright-report/
          if-no-files-found: warn
          retention-days: 14

  regenerate-interview-snapshots:
    needs: [e2e-policy, interview-e2e]
    if: >-
      ${{ always()
      && needs.e2e-policy.outputs.release_ref != ''
      && needs.interview-e2e.result == 'failure'
      && needs.interview-e2e.outputs.snapshot_failure == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/regenerate-e2e-visual-snapshots.yml
    with:
      suite: interview

  regenerate-interviewer-snapshots:
    needs: [e2e-policy, interviewer-e2e]
    if: >-
      ${{ always()
      && needs.e2e-policy.outputs.release_ref != ''
      && needs.interviewer-e2e.result == 'failure'
      && needs.interviewer-e2e.outputs.snapshot_failure == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/regenerate-e2e-visual-snapshots.yml
    with:
      suite: interviewer

  regenerate-architect-snapshots:
    needs: [e2e-policy, architect-e2e]
    if: >-
      ${{ always()
      && needs.e2e-policy.outputs.release_ref != ''
      && needs.architect-e2e.result == 'failure'
      && needs.architect-e2e.outputs.snapshot_failure == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/regenerate-e2e-visual-snapshots.yml
    with:
      suite: architect

  open-e2e-snapshot-update-pr:
    needs:
      - e2e-policy
      - regenerate-interview-snapshots
      - regenerate-interviewer-snapshots
      - regenerate-architect-snapshots
    if: >-
      ${{ always()
      && needs.e2e-policy.outputs.release_ref != ''
      && (needs.regenerate-interview-snapshots.result == 'success'
      || needs.regenerate-interviewer-snapshots.result == 'success'
      || needs.regenerate-architect-snapshots.result == 'success') }}
    permissions:
      actions: write
      contents: write
      pull-requests: write
    uses: ./.github/workflows/open-e2e-snapshot-update-pr.yml
    with:
      release_ref: ${{ needs.e2e-policy.outputs.release_ref }}
      run_head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      snapshot_branch: ${{ needs.e2e-policy.outputs.snapshot_branch }}
      source_run_url: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}

  # Publishes the Playwright report to GitHub Pages and comments the E2E result
  # on the PR. Purely informational: whether the report PUBLISHED says nothing
  # about whether the code is sound — the actual verdict is the interview-e2e job
  # (and the comment below). continue-on-error keeps a reporting/Pages-deploy
  # hiccup from failing the workflow run and gating a release; it is also
  # excluded from the carry-forward job so its verdict is never republished onto
  # an unrelated push (see carry-forward-statuses).
  interview-e2e-report:
    needs: interview-e2e
    if: ${{ !cancelled() && needs.interview-e2e.result != 'skipped' }}
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      # contents: write is for the gh-pages state branch below, not the source.
      contents: write
      pages: write
      id-token: write
      pull-requests: write
    concurrency:
      group: interview-e2e-pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: https://complexdatacollective.github.io/network-canvas-monorepo/interview-e2e/${{ needs.interview-e2e.outputs.slug }}/
    steps:
      - name: Download new report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: interview-playwright-report
          path: new-report
      - name: Fetch existing pages content
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: gh-pages
          path: existing-pages
        continue-on-error: true
      - name: Merge report into branch subdirectory
        env:
          SLUG: ${{ needs.interview-e2e.outputs.slug }}
        run: |
          mkdir -p merged
          if [ -d existing-pages ] && [ "$(ls -A existing-pages 2>/dev/null)" ]; then
            cp -r existing-pages/. merged/
            rm -rf merged/.git
          fi
          rm -rf "merged/interview-e2e/$SLUG"
          mkdir -p "merged/interview-e2e/$SLUG"
          cp -r new-report/. "merged/interview-e2e/$SLUG/"
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: merged/
      - name: Persist merged site to gh-pages branch
        # deploy-pages replaces the ENTIRE Pages site with this run's artifact
        # and maintains no branch, so the only prior content the merge step can
        # fetch is what this step saves. Without it, the two release lanes
        # erase each other's report subdirectory on every deploy (the report
        # link 404s a minute after it is posted). The branch is pure derived
        # state, so force-push a fresh single commit; the job concurrency
        # group serialises writers.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init -q -b gh-pages "$RUNNER_TEMP/pages-state"
          git --git-dir="$RUNNER_TEMP/pages-state/.git" --work-tree=merged add -A
          git --git-dir="$RUNNER_TEMP/pages-state/.git" --work-tree=merged \
            -c user.name="github-actions[bot]" \
            -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -q -m "interview-e2e report site (run ${{ github.run_id }})"
          git --git-dir="$RUNNER_TEMP/pages-state/.git" push -q --force \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" gh-pages
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
      - name: Comment on PR
        # always(): still post the E2E result even if the Pages publish above
        # failed — the report link may be stale but the pass/fail signal is the
        # point.
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SLUG: ${{ needs.interview-e2e.outputs.slug }}
          OUTCOME: ${{ needs.interview-e2e.result }}
        with:
          script: |
            const { SLUG, OUTCOME } = process.env;
            const url = `https://complexdatacollective.github.io/network-canvas-monorepo/interview-e2e/${SLUG}/`;
            const emoji = OUTCOME === 'success' ? '✅' : '❌';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${emoji} Interview E2E — **${OUTCOME}**\n\n📊 [View report](${url})`,
            });

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      actions: write
      contents: write
      pull-requests: write
      id-token: write
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
          fetch-depth: 2
      - uses: ./.github/actions/turbo-ci-setup
      - name: Build all publishable packages
        # Only build the workspaces under packages/ — those are what changesets
        # publishes to npm. Apps (./apps/*) are private:true and don't need to
        # build successfully here; their deploy pipeline is per-app deploy jobs.
        run: pnpm exec turbo run build --filter='./packages/*'
      - id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: pnpm run version-packages
          publish: pnpm run publish-packages
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
      - name: Run CI on the Version Packages branch
        if: steps.changesets.outputs.hasChangesets == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run ci-and-release.yml --ref changeset-release/main

  # Maintains one gated release PR per product (siblings of the library "Version
  # Packages" PR). On every push to main each matrix entry re-runs the version
  # step on its own fresh branch and opens, updates, or closes only that product's
  # PR. Product changesets are ignored by the library release, so they persist in
  # .changeset/ until the matching matrix entry consumes them.
  product-release-pr:
    name: Release PR (${{ matrix.product }})
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - product: Architect
            slug: architect
            package: '@codaco/architect'
          - product: Documentation
            slug: documentation
            package: '@codaco/documentation'
          - product: Interviewer
            slug: interviewer
            package: '@codaco/interviewer'
          - product: Website
            slug: website
            package: 'networkcanvas.com'
    runs-on: ubuntu-latest
    concurrency:
      group: product-release-pr-${{ matrix.slug }}
      cancel-in-progress: false
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Guard against mixed changesets
        run: pnpm check:changesets
      - name: Compute ${{ matrix.product }} version bump
        env:
          PACKAGE: ${{ matrix.package }}
        run: >-
          node scripts/version-beta-apps.mjs
          --package "$PACKAGE"
          --out "${RUNNER_TEMP}/product-release-body.md"
      - name: Open/update the ${{ matrix.product }} release PR
        id: product_pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: changeset-release/${{ matrix.slug }}
          base: main
          delete-branch: true
          title: 'Release ${{ matrix.product }}'
          commit-message: 'chore(release): version ${{ matrix.slug }}'
          body-path: ${{ runner.temp }}/product-release-body.md
      - name: Run CI on the ${{ matrix.product }} release branch
        if: >-
          ${{ steps.product_pr.outputs['pull-request-operation'] == 'created'
          || steps.product_pr.outputs['pull-request-operation'] == 'updated' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REF: changeset-release/${{ matrix.slug }}
        run: gh workflow run ci-and-release.yml --ref "$RELEASE_REF"

  # The combined product branch predates the independent gates. Once this change
  # reaches main, close its parent release PR and any snapshot child that still
  # targets it so the retired gate cannot release several products together.
  # Branches are deliberately left intact; this is a reversible PR-state change.
  retire-combined-release-pr:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Close PRs attached to the retired combined release branch
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const retiredRef = 'changeset-release/apps';
            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const retired = pulls.filter(
              (pull) =>
                pull.head.repo?.full_name === `${context.repo.owner}/${context.repo.repo}` &&
                (pull.head.ref === retiredRef || pull.base.ref === retiredRef),
            );

            for (const pull of retired) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pull.number,
                body:
                  'This PR was closed because the combined product release gate has been replaced by independent Architect, Interviewer, Documentation, and Website release PRs. Pending changesets will be proposed again in the matching product PR.',
              });
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pull.number,
                state: 'closed',
              });
            }

  # On a push to main that changes a gated product version (i.e. one product's
  # release PR just merged), detect which product moved. Idempotency is a local
  # git-tag check (no external repo).
  apps-release-detect:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      architect_released: ${{ steps.architect.outputs.released }}
      architect_version: ${{ steps.architect.outputs.version }}
      documentation_released: ${{ steps.documentation.outputs.released }}
      documentation_version: ${{ steps.documentation.outputs.version }}
      interviewer_released: ${{ steps.interviewer.outputs.released }}
      interviewer_version: ${{ steps.interviewer.outputs.version }}
      website_released: ${{ steps.website.outputs.released }}
      website_version: ${{ steps.website.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 2
          fetch-tags: true
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: '.nvmrc'
      - id: architect
        env:
          PKG_JSON: apps/architect/package.json
          PKG_NAME: '@codaco/architect'
        run: bash .github/scripts/detect-app-release.sh
      - id: documentation
        env:
          PKG_JSON: apps/documentation/package.json
          PKG_NAME: '@codaco/documentation'
          RELEASE_CHANNEL: stable
        run: bash .github/scripts/detect-app-release.sh
      - id: interviewer
        env:
          PKG_JSON: apps/interviewer/package.json
          PKG_NAME: '@codaco/interviewer'
        run: bash .github/scripts/detect-app-release.sh
      - id: website
        env:
          PKG_JSON: apps/networkcanvas.com/package.json
          PKG_NAME: 'networkcanvas.com'
          RELEASE_CHANNEL: stable
        run: bash .github/scripts/detect-app-release.sh

  # Build, deploy to Netlify production, and cut a GitHub release for architect
  # when its version changed. Separate from the interviewer job (below) so one
  # app's build/deploy failure never blocks the other's release — the same
  # per-app isolation the deleted deploy-*-prod jobs had.
  apps-release-architect:
    needs: apps-release-detect
    if: needs.apps-release-detect.outputs.architect_released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # One release per version. With per-commit push concurrency (see top of file)
    # main pushes run in parallel, so two runs can both detect the same untagged
    # version and race into a duplicate build/deploy/release. Serialise them on
    # the tag so only one runs at a time; the guard step below turns the run that
    # starts after the tag exists into a clean no-op (no redundant prod deploy).
    concurrency:
      group: apps-release-@codaco/architect@${{ needs.apps-release-detect.outputs.architect_version }}
      cancel-in-progress: false
    permissions:
      contents: write
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      VITE_FRESCO_PREVIEW_URL: ${{ secrets.VITE_FRESCO_PREVIEW_URL }}
      VITE_FRESCO_PREVIEW_API_TOKEN: ${{ secrets.VITE_FRESCO_PREVIEW_API_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-tags: true
          persist-credentials: false
      - name: Skip if this version was already released
        id: guard
        env:
          TAG: '@codaco/architect@${{ needs.apps-release-detect.outputs.architect_version }}'
        run: |
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "$TAG already released — nothing to do"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.skip != 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - if: steps.guard.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build & deploy architect to production
        if: steps.guard.outputs.skip != 'true'
        run: |
          pnpm exec turbo run build --filter=@codaco/architect
          npx --yes netlify-cli@22 deploy --no-build --prod \
            --filter=@codaco/architect \
            --dir=apps/architect/dist \
            --site="${{ secrets.NETLIFY_SITE_ID_ARCHITECT }}"
      - name: architect release notes
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.apps-release-detect.outputs.architect_version }}
        run: >-
          node scripts/release-notes.mjs
          --app apps/architect
          --pkg @codaco/architect
          --version "$VERSION"
          --out "${RUNNER_TEMP}/architect-notes.md"
      - if: steps.guard.outputs.skip != 'true'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: '@codaco/architect@${{ needs.apps-release-detect.outputs.architect_version }}'
          name: Architect ${{ needs.apps-release-detect.outputs.architect_version }}
          body_path: ${{ runner.temp }}/architect-notes.md
          prerelease: true
          make_latest: 'false'

  # Build, deploy to Netlify production, and cut a GitHub release for interviewer
  # when its version changed. Separate job (see apps-release-architect) so a
  # failure in one app's build never blocks the other's release.
  # NOTE(human-setup-required): needs NETLIFY_SITE_ID_INTERVIEWER set —
  # see apps/interviewer/RELEASING.md.
  apps-release-interviewer:
    needs: apps-release-detect
    if: needs.apps-release-detect.outputs.interviewer_released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # One release per version — see apps-release-architect for the rationale.
    concurrency:
      group: apps-release-@codaco/interviewer@${{ needs.apps-release-detect.outputs.interviewer_version }}
      cancel-in-progress: false
    permissions:
      contents: write
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-tags: true
          persist-credentials: false
      - name: Skip if this version was already released
        id: guard
        env:
          TAG: '@codaco/interviewer@${{ needs.apps-release-detect.outputs.interviewer_version }}'
        run: |
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "$TAG already released — nothing to do"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.skip != 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - if: steps.guard.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build & deploy interviewer to production
        if: steps.guard.outputs.skip != 'true'
        run: |
          pnpm exec turbo run build --filter=@codaco/interviewer
          npx --yes netlify-cli@22 deploy --no-build --prod \
            --filter=@codaco/interviewer \
            --dir=apps/interviewer/dist \
            --site="${{ secrets.NETLIFY_SITE_ID_INTERVIEWER }}"
      - name: interviewer release notes
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.apps-release-detect.outputs.interviewer_version }}
        run: >-
          node scripts/release-notes.mjs
          --app apps/interviewer
          --pkg @codaco/interviewer
          --version "$VERSION"
          --out "${RUNNER_TEMP}/interviewer-notes.md"
      - if: steps.guard.outputs.skip != 'true'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: '@codaco/interviewer@${{ needs.apps-release-detect.outputs.interviewer_version }}'
          name: Interviewer ${{ needs.apps-release-detect.outputs.interviewer_version }}
          body_path: ${{ runner.temp }}/interviewer-notes.md
          prerelease: true
          make_latest: 'false'

  # Documentation follows the same generated-release-PR gate as the PWA apps,
  # but uses normal semver and produces only a Netlify deployment + git tag.
  apps-release-documentation:
    needs: apps-release-detect
    if: needs.apps-release-detect.outputs.documentation_released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: apps-release-@codaco/documentation@${{ needs.apps-release-detect.outputs.documentation_version }}
      cancel-in-progress: false
    permissions:
      contents: write
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NEXT_PUBLIC_ALGOLIA_APPLICATION_ID: ${{ secrets.NEXT_PUBLIC_ALGOLIA_APPLICATION_ID }}
      NEXT_PUBLIC_ALGOLIA_INDEX_NAME: ${{ secrets.NEXT_PUBLIC_ALGOLIA_INDEX_NAME }}
      NEXT_PUBLIC_ALGOLIA_API_KEY: ${{ secrets.NEXT_PUBLIC_ALGOLIA_API_KEY }}
      NEXT_PUBLIC_MENDABLE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_MENDABLE_ANON_KEY }}
      NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-tags: true
          persist-credentials: false
      - name: Skip if this version was already deployed
        id: guard
        env:
          TAG: '@codaco/documentation@${{ needs.apps-release-detect.outputs.documentation_version }}'
        run: |
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "$TAG already deployed — nothing to do"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.skip != 'true'
        uses: ./.github/actions/turbo-ci-setup
      - name: Build and deploy documentation to production
        if: steps.guard.outputs.skip != 'true'
        run: |
          pnpm exec turbo run build --filter=@codaco/documentation
          cp apps/documentation/netlify.toml apps/documentation/out/netlify.toml
          npx --yes netlify-cli@22 deploy --no-build --prod \
            --filter=@codaco/documentation \
            --dir=apps/documentation/out \
            --site="${{ secrets.NETLIFY_DOCUMENTATION_SITE_ID }}"
      - name: Tag deployed documentation version
        if: steps.guard.outputs.skip != 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          TAG: '@codaco/documentation@${{ needs.apps-release-detect.outputs.documentation_version }}'
        with:
          script: |
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${process.env.TAG}`,
              sha: context.sha,
            });

  # networkcanvas.com follows the same stable generated-release-PR gate as the
  # documentation site. A successful deploy is recorded with a git tag; websites
  # do not create GitHub Releases.
  apps-release-website:
    needs: apps-release-detect
    if: needs.apps-release-detect.outputs.website_released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: apps-release-networkcanvas.com@${{ needs.apps-release-detect.outputs.website_version }}
      cancel-in-progress: false
    permissions:
      contents: write
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-tags: true
          persist-credentials: false
      - name: Skip if this version was already deployed
        id: guard
        env:
          TAG: networkcanvas.com@${{ needs.apps-release-detect.outputs.website_version }}
        run: |
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "$TAG already deployed — nothing to do"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.skip != 'true'
        uses: ./.github/actions/turbo-ci-setup
      - name: Build and deploy networkcanvas.com to production
        if: steps.guard.outputs.skip != 'true'
        run: |
          json=$(npx --yes netlify-cli@26 deploy --build --prod \
                   --filter=networkcanvas.com \
                   --site="${{ secrets.NETLIFY_SITE_ID_WEBSITE }}" --json)
          echo "$json" | jq .
      - name: Tag deployed website version
        if: steps.guard.outputs.skip != 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          TAG: networkcanvas.com@${{ needs.apps-release-detect.outputs.website_version }}
        with:
          script: |
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${process.env.TAG}`,
              sha: context.sha,
            });

  # Decide whether to (re)release the legacy desktop apps. A release fires when:
  #   * a workflow_dispatch selected the app (forced release at the current
  #     package.json version, even with no version change — used for the initial
  #     6.6.0 cut), OR
  #   * the app's external repo has no release for the current version yet
  #     (idempotent first-time check — also makes a normal push to main release a
  #     newly-bumped version, and a no-op once that version is already published), OR
  #   * the version changed versus the previous commit (defensive: covers bumps
  #     even if the release somehow predates this check).
  # version is always the current apps/<app>/package.json version.
  legacy-release-detect:
    # Only ever runs on main — a manual workflow_dispatch from a feature branch
    # must not mirror/publish branch-only code to the external app repos.
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      architect_released: ${{ steps.architect.outputs.released }}
      architect_version: ${{ steps.architect.outputs.version }}
      interviewer_released: ${{ steps.interviewer.outputs.released }}
      interviewer_version: ${{ steps.interviewer.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 2
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: '.nvmrc'
      - name: Detect architect release
        id: architect
        env:
          PKG_JSON: apps/architect-classic/package.json
          EXTERNAL_REPO: complexdatacollective/architect
          FORCED: ${{ (github.event_name == 'workflow_dispatch' && (inputs.release_app == 'architect' || inputs.release_app == 'both')) }}
          GH_TOKEN: ${{ secrets.LEGACY_RELEASE_GH_TOKEN }}
        run: bash .github/scripts/detect-legacy-release.sh
      - name: Detect interviewer release
        id: interviewer
        env:
          PKG_JSON: apps/interviewer-classic/package.json
          EXTERNAL_REPO: complexdatacollective/interviewer
          FORCED: ${{ (github.event_name == 'workflow_dispatch' && (inputs.release_app == 'interviewer' || inputs.release_app == 'both')) }}
          GH_TOKEN: ${{ secrets.LEGACY_RELEASE_GH_TOKEN }}
        run: bash .github/scripts/detect-legacy-release.sh

  interviewer-release-build:
    needs: legacy-release-detect
    if: needs.legacy-release-detect.outputs.interviewer_released == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: ./.github/actions/turbo-ci-setup
        with:
          ignore-scripts: 'false'
      - name: Build app + workspace deps
        run: pnpm exec turbo run build --filter=@codaco/interviewer-classic
      - name: Decode App Store Connect API key
        if: matrix.os == 'macos-latest'
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY }}
        run: |
          key_path="${RUNNER_TEMP}/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_B64" | base64 --decode > "$key_path"
          echo "APPLE_API_KEY=${key_path}" >> "$GITHUB_ENV"
      # Build only — the release lifecycle (tag, draft, attach, publish) is owned
      # by the mirror + publish jobs, so electron-builder must not publish.
      # macOS notarization runs automatically when APPLE_API_KEY is set (the
      # config gates `notarize` on it); Windows ships unsigned (no CSC_LINK).
      - name: Package
        working-directory: apps/interviewer-classic
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.CSC_KEY_PASSWORD || '' }}
        run: pnpm exec electron-builder --${{ matrix.platform }} --config electron-builder.config.cjs --publish never
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Distinct prefix so the publish job's glob doesn't also collect the
          # `interviewer-*` artifacts built in the same run.
          name: interviewer-release-${{ matrix.platform }}
          path: apps/interviewer-classic/release-builds/*
          if-no-files-found: error
          retention-days: 30

  architect-release-build:
    needs: legacy-release-detect
    if: needs.legacy-release-detect.outputs.architect_released == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: ./.github/actions/turbo-ci-setup
        with:
          ignore-scripts: 'false'
      - name: Build app + workspace deps
        run: pnpm exec turbo run build --filter=@codaco/architect-classic
      - name: Decode App Store Connect API key
        if: matrix.os == 'macos-latest'
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY }}
        run: |
          key_path="${RUNNER_TEMP}/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_B64" | base64 --decode > "$key_path"
          echo "APPLE_API_KEY=${key_path}" >> "$GITHUB_ENV"
      # Build only — the release lifecycle (tag, draft, attach, publish) is owned
      # by the mirror + publish jobs, so electron-builder must not publish.
      # macOS notarization runs automatically when APPLE_API_KEY is set (the
      # config gates `notarize` on it); Windows ships unsigned (no CSC_LINK,
      # no certificateSubjectName).
      - name: Package
        working-directory: apps/architect-classic
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.CSC_KEY_PASSWORD || '' }}
        run: pnpm exec electron-builder --${{ matrix.platform }} --config electron-builder.config.js --publish never
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: architect-${{ matrix.platform }}
          path: apps/architect-classic/release-builds/*
          if-no-files-found: error
          retention-days: 30

  # Mirror Interviewer source into complexdatacollective/interviewer master
  # (linear-append commit, npm-installable manifest, no node_modules) and create a
  # DRAFT GitHub release on that repo. Runs in parallel with the build job.
  interviewer-mirror:
    needs: legacy-release-detect
    if: needs.legacy-release-detect.outputs.interviewer_released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      mirror_sha: ${{ steps.mirror.outputs.mirror_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: '.nvmrc'
      - name: Mirror source to external master
        id: mirror
        env:
          LEGACY_RELEASE_GH_TOKEN: ${{ secrets.LEGACY_RELEASE_GH_TOKEN }}
          MONOREPO_SHA: ${{ github.sha }}
        run: >-
          node scripts/mirror-app.mjs
          --app apps/interviewer-classic
          --repo complexdatacollective/interviewer
          --version ${{ needs.legacy-release-detect.outputs.interviewer_version }}
      - name: Extract release notes
        run: >-
          node scripts/release-notes.mjs
          --app apps/interviewer-classic
          --pkg @codaco/interviewer-classic
          --version ${{ needs.legacy-release-detect.outputs.interviewer_version }}
          --out "${RUNNER_TEMP}/notes.md"
      - name: Create draft release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          repository: complexdatacollective/interviewer
          token: ${{ secrets.LEGACY_RELEASE_GH_TOKEN }}
          tag_name: v${{ needs.legacy-release-detect.outputs.interviewer_version }}
          target_commitish: ${{ steps.mirror.outputs.mirror_sha }}
          name: Network Canvas Interviewer v${{ needs.legacy-release-detect.outputs.interviewer_version }}
          body_path: ${{ runner.temp }}/notes.md
          draft: true
          make_latest: 'false'

  # Collect Interviewer platform artifacts, attach to the draft release, publish it.
  interviewer-release-publish:
    needs:
      [legacy-release-detect, interviewer-mirror, interviewer-release-build]
    if: needs.legacy-release-detect.outputs.interviewer_released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: interviewer-release-*
          merge-multiple: true
      - run: ls -la artifacts/
      - name: Attach artifacts and publish
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          repository: complexdatacollective/interviewer
          token: ${{ secrets.LEGACY_RELEASE_GH_TOKEN }}
          tag_name: v${{ needs.legacy-release-detect.outputs.interviewer_version }}
          files: artifacts/*
          fail_on_unmatched_files: true
          draft: false
          make_latest: 'false'

  # Mirror Architect source into complexdatacollective/architect master and create
  # a DRAFT release. Builds the Interviewer preview bundle first so it can be
  # vendored into the mirror (the standalone repo has no monorepo sibling to copy
  # ../interviewer-classic/out from).
  architect-mirror:
    needs: legacy-release-detect
    if: needs.legacy-release-detect.outputs.architect_released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    outputs:
      mirror_sha: ${{ steps.mirror.outputs.mirror_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build Interviewer preview bundle (vendored into the mirror)
        run: pnpm exec turbo run build --filter=@codaco/interviewer-classic
      - name: Mirror source to external master
        id: mirror
        env:
          LEGACY_RELEASE_GH_TOKEN: ${{ secrets.LEGACY_RELEASE_GH_TOKEN }}
          MONOREPO_SHA: ${{ github.sha }}
        run: >-
          node scripts/mirror-app.mjs
          --app apps/architect-classic
          --repo complexdatacollective/architect
          --version ${{ needs.legacy-release-detect.outputs.architect_version }}
      - name: Extract release notes
        run: >-
          node scripts/release-notes.mjs
          --app apps/architect-classic
          --pkg @codaco/architect-classic
          --version ${{ needs.legacy-release-detect.outputs.architect_version }}
          --out "${RUNNER_TEMP}/notes.md"
      - name: Create draft release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          repository: complexdatacollective/architect
          token: ${{ secrets.LEGACY_RELEASE_GH_TOKEN }}
          tag_name: v${{ needs.legacy-release-detect.outputs.architect_version }}
          target_commitish: ${{ steps.mirror.outputs.mirror_sha }}
          name: Network Canvas Architect v${{ needs.legacy-release-detect.outputs.architect_version }}
          body_path: ${{ runner.temp }}/notes.md
          draft: true
          make_latest: 'false'

  # Collect Architect platform artifacts, attach to the draft release, publish it.
  architect-release-publish:
    needs: [legacy-release-detect, architect-mirror, architect-release-build]
    if: needs.legacy-release-detect.outputs.architect_released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: architect-*
          merge-multiple: true
      - run: ls -la artifacts/
      - name: Attach artifacts and publish
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          repository: complexdatacollective/architect
          token: ${{ secrets.LEGACY_RELEASE_GH_TOKEN }}
          tag_name: v${{ needs.legacy-release-detect.outputs.architect_version }}
          files: artifacts/*
          fail_on_unmatched_files: true
          draft: false
          make_latest: 'false'

  # Carry forward prior statuses for conditional jobs that the current
  # push didn't touch. Push-to-push detection (see detect job)
  # deliberately re-runs a job ONLY when its package changed between
  # consecutive PR commits, but GitHub renders the latest workflow run's
  # check list — so jobs that ran on an earlier PR commit would appear
  # "skipped" on the new tip and (depending on branch protection config)
  # block merge.
  #
  # This step republishes a check_run on the current SHA — same name,
  # same conclusion as the job's most recent CONCLUSIVE prior run —
  # pointing at that run. Crucially it carries the prior verdict faithfully:
  # a job that last FAILED for unchanged code stays red, rather than being
  # masked by an even-older green run. Branch protection sees the
  # most-recent check_run for each name, so a still-valid pass merges
  # without re-running and a still-valid failure keeps blocking — both
  # without burning runner time re-executing work that hasn't changed.
  #
  # First push on a PR: no prior runs exist, so nothing to carry; the
  # detect logic already runs the relevant jobs at least once because
  # the push diff IS the cumulative PR diff on the first commit.
  # E2E jobs are deliberately excluded: release PRs run all three on every
  # push and the required quality gate checks their live results; non-release
  # PRs must never inherit an E2E verdict from an earlier commit.
  carry-forward-statuses:
    needs:
      - detect
      - docs-preview-checks
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          # Map detect flag → list of conditional jobs gated on it.
          # interview-e2e-report is deliberately NOT here: it is a dependent,
          # reporting-only job (publishes the Playwright report to Pages +
          # comments) whose own `if:` already skips it whenever interview-e2e is
          # skipped. Its verdict describes whether the report PUBLISHED, not
          # whether the code is sound, so carrying a stale (possibly failed)
          # report verdict onto an unrelated push would wrongly gate it — let
          # its natural skip stand instead.
          FLAG_DOCS: ${{ needs.detect.outputs.docs }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const flagToJobs = {
              FLAG_DOCS: ["docs-preview-checks"],
            };

            // Only consider jobs the current run didn't execute (flag false).
            // If a flag is true, the real job ran on this commit and its own
            // check_run already reflects the outcome — no carry-forward needed.
            const skippedJobs = Object.entries(flagToJobs).flatMap(
              ([flag, jobs]) => (process.env[flag] === "false" ? jobs : []),
            );
            if (skippedJobs.length === 0) {
              core.info("No skipped conditional jobs on this run; nothing to carry forward.");
              return;
            }

            // Walk prior workflow runs on this PR's source branch, most recent
            // first, looking for the latest CONCLUSIVE execution of each skipped
            // job — the run whose verdict still describes the current code,
            // since the job was skipped on this push precisely because its
            // package didn't change. The first conclusive verdict we encounter
            // is authoritative whether it passed or failed; carrying a stale
            // success over an intervening failure would misrepresent the branch.
            // "success", "failure" and "timed_out" are conclusive verdicts;
            // "skipped", "cancelled" (superseded by a newer push — see the
            // cancel-in-progress concurrency above) and in-flight runs carry no
            // verdict, so we walk past them.
            const CONCLUSIVE = new Set(["success", "failure", "timed_out"]);
            const remaining = new Set(skippedJobs);
            const resolutions = new Map();
            let page = 1;
            const PER_PAGE = 50;
            const MAX_RUNS = 200; // safety cap; PRs rarely have 200 runs.
            let scanned = 0;

            outer: while (remaining.size > 0 && scanned < MAX_RUNS) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: process.env.PR_HEAD_REF,
                event: "pull_request",
                per_page: PER_PAGE,
                page,
              });
              if (data.workflow_runs.length === 0) break;

              for (const run of data.workflow_runs) {
                scanned += 1;
                // Skip the run we're currently inside of.
                if (run.id === context.runId) continue;
                // Skip runs against the same commit (re-runs of the same SHA
                // don't introduce new information).
                if (run.head_sha === process.env.PR_HEAD_SHA) continue;
                // Pull the job list for this run.
                const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id,
                  per_page: 100,
                });
                for (const job of jobs.jobs) {
                  if (!remaining.has(job.name)) continue;
                  if (!CONCLUSIVE.has(job.conclusion)) continue;
                  resolutions.set(job.name, { run, job });
                  remaining.delete(job.name);
                }
                if (remaining.size === 0) break outer;
              }
              if (data.workflow_runs.length < PER_PAGE) break;
              page += 1;
            }

            for (const [name, { run, job }] of resolutions) {
              const conclusion = job.conclusion;
              const passed = conclusion === "success";
              const outcome = passed
                ? `ran successfully`
                : `last ran to a \`${conclusion}\` conclusion`;
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name,
                head_sha: context.sha,
                status: "completed",
                conclusion,
                details_url: job.html_url,
                output: {
                  title: `Carried forward from ${run.head_sha.substring(0, 7)}`,
                  summary: [
                    `This job ${outcome} on an earlier commit of this PR and the latest push did not touch its package, so it was not re-executed. That result still applies to the current code.`,
                    ``,
                    `Source run: [#${run.run_number}](${run.html_url}) on commit \`${run.head_sha.substring(0, 7)}\`.`,
                  ].join("\n"),
                },
              });
              core.info(`Carried forward ${name} (${conclusion}) from run #${run.run_number} (${run.head_sha.substring(0, 7)}).`);
            }

            for (const name of remaining) {
              core.info(`No prior conclusive run found for ${name}; leaving its skipped status as-is.`);
            }
