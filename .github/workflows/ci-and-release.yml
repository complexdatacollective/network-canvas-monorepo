name: CI and Release (Optimized)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read      # Allow reading repository contents
  packages: read      # Allow reading GitHub Packages
  actions: read       # Allow read-only access to workflow runs and jobs
  checks: write       # Allow updating check runs (needed for changesets/action)
  pull-requests: write # Allow creating pull requests (needed for changesets/action)

jobs:
  # Setup job that all other jobs depend on
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-consts
        run: pnpm --filter @codaco/shared-consts build

      - name: Build protocol-validation
        run: pnpm --filter @codaco/protocol-validation build

      # Upload shared-consts build as artifact
      - name: Upload shared-consts build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: shared-consts-dist
          path: packages/shared-consts/dist
          retention-days: 1

      # Upload protocol-validation build as artifact
      - name: Upload protocol-validation build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: protocol-validation-dist
          path: packages/protocol-validation/dist
          retention-days: 1

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download shared-consts build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: shared-consts-dist
          path: packages/shared-consts/dist

      - name: Download protocol-validation build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: protocol-validation-dist
          path: packages/protocol-validation/dist

      - name: Check formatting
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Knip
        run: pnpm knip

      - name: Validate redirects
        run: pnpm --filter @codaco/documentation validate-redirects

  test:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      PROTOCOL_ENCRYPTION_KEY: ${{ secrets.PROTOCOL_ENCRYPTION_KEY }}
      PROTOCOL_ENCRYPTION_IV: ${{ secrets.PROTOCOL_ENCRYPTION_IV }}
      GITHUB_TOKEN: ${{ secrets.TEST_PROTOCOL_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        # --ignore-scripts: defense-in-depth alongside the release job. The
        # test job exposes PROTOCOL_ENCRYPTION_KEY/IV and TEST_PROTOCOL_TOKEN
        # via env; preventing lifecycle scripts from running here removes a
        # path where a compromised transitive dep could read those secrets.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download shared-consts build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: shared-consts-dist
          path: packages/shared-consts/dist

      - name: Download protocol-validation build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: protocol-validation-dist
          path: packages/protocol-validation/dist

      - name: Install Playwright Chromium (for fresco-ui storybook tests)
        run: pnpm --filter @codaco/fresco-ui exec playwright install --with-deps chromium

      - name: Create .env file and run tests
        run: |
          echo "PROTOCOL_ENCRYPTION_KEY=${{ secrets.PROTOCOL_ENCRYPTION_KEY }}" > packages/protocol-validation/.env
          echo "PROTOCOL_ENCRYPTION_IV=${{ secrets.PROTOCOL_ENCRYPTION_IV }}" >> packages/protocol-validation/.env
          echo "GITHUB_TOKEN=${{ secrets.TEST_PROTOCOL_TOKEN }}" >> packages/protocol-validation/.env
          pnpm test

  release:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    # Only run on main branch pushes (not PRs) and only if lint and test jobs succeed
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [setup, lint, test]
    runs-on: ubuntu-latest
    environment: npm-publish
    env:
      NEXT_PUBLIC_DOCS_PATH: "docs"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
    steps:
    - name: Check out the code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      with:
        # Don't leave GITHUB_TOKEN in the local git config after checkout.
        # changesets/action reads GITHUB_TOKEN from its env block at line ~189;
        # nothing else in this job needs the token in git config.
        persist-credentials: false
    - name: Install pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
      with:
        node-version-file: '.nvmrc'
        cache: 'pnpm'
    - name: Install dependencies
      # --ignore-scripts: this job holds id-token: write and the npm publish
      # credential, so refuse to execute lifecycle scripts from any (potentially
      # compromised) transitive dep. Explicit builds run as their own steps below.
      run: pnpm install --frozen-lockfile --ignore-scripts

    - name: Download shared-consts build
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
      with:
        name: shared-consts-dist
        path: packages/shared-consts/dist

    - name: Download protocol-validation build
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
      with:
        name: protocol-validation-dist
        path: packages/protocol-validation/dist

    # Build only packages with changesets
    - name: Build changed packages only
      run: pnpm run build:changed-packages

    - name: Create Release Pull Request
      uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b  # v1
      with:
        # command used to version packages. Lint and fix to avoid errors caused
        # by versioning
        version: pnpm run version-packages
        # Runs changesets publish. versioning is done by changesets action
        publish: pnpm run publish-packages
        createGithubReleases: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NPM_CONFIG_PROVENANCE: true
