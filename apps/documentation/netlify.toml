# Bare /en/fresco must precede the /en/fresco/* splat below — otherwise the
# splat matches with an empty :splat and shadows this dedicated landing page.
[[redirects]]
from = "/en/fresco"
to = "/en/collect-data/fresco/about"
status = 301

[[redirects]]
from = "/en/fresco/*"
to = "/en/collect-data/fresco/:splat"
