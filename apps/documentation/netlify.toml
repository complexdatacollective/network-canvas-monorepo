[[redirects]]
from = "/"
to = "/en"
status = 301
# Next.js static export emits out/index.html (for the next-intl root
# redirect), and Netlify [[redirects]] only fire when no static file
# exists at the path. Force this rule so the 301 wins over index.html.
force = true

# Legacy flat (pre-locale) top-level pages
[[redirects]]
from = "/citing-the-software"
to = "/en/get-started/project-information/citing-the-software"
status = 301

