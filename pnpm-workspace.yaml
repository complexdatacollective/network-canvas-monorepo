  '@vitest/browser-playwright': ^4.1.10
  '@vitest/coverage-v8': ^4.1.10
  chromatic: ^17.3.0
  class-variance-authority: 0.7.1
  csvtojson: ^2.0.14
  dotenv: ^17.4.2
  effect: ^3.21.2
  electron: ^43.0.0
  electron-builder: ^26.15.2
  electron-vite: ^6.0.0-beta.1
  es-toolkit: ^1.47.0
  fuse.js: ^7.5.0
  jsdom: ^29.1.1
  jszip: ^3.10.1
  lucide-react: ^1.17.0
  motion: ^12.40.0
  next: ^16.2.10
