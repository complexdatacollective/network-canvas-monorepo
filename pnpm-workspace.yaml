packages:
  - apps/*
  - apps/interviewer-v7/native/*
  - packages/*
  - tooling/*
  - workers/*

allowBuilds:
  '@clerk/shared': true
  '@parcel/watcher': true
  '@swc/core': true
  '@tailwindcss/oxide': true
  bufferutil: true
  core-js: true
  esbuild: true
  sharp: true
  electron: false
  electron-winstaller: false
  phantomjs-prebuilt: false
  protobufjs: false
  workerd: false
  better-sqlite3-multiple-ciphers: true

catalog:
  '@base-ui/react': ^1.5.0
  '@chromatic-com/storybook': ^5.2.1
  '@faker-js/faker': ^10.4.0
  '@next/bundle-analyzer': ^16.2.6
  '@next/third-parties': ^16.2.6
  '@posthog/react': ^1.9.1
  '@radix-ui/react-dialog': ^1.1.15
  '@radix-ui/react-slot': ^1.2.4
  '@reduxjs/toolkit': ^2.12.0
  '@tailwindcss/container-queries': ^0.1.1
  '@tailwindcss/postcss': ^4.3.0
  '@tailwindcss/typography': ^0.5.19
  '@tailwindcss/vite': ^4.3.0
  '@tanstack/react-table': ^8.21.3
  '@types/node': ^24.12.4
  '@types/react': ^19.2.15
  '@types/react-dom': ^19.2.3
  '@vitejs/plugin-react': ^6.0.2
  '@vitest/browser': ^4.1.7
  '@vitest/browser-playwright': ^4.1.7
  chromatic: ^17.2.0
  class-variance-authority: 0.7.1
  dotenv: ^17.4.2
  effect: ^3.21.2
  electron: ^42.3.0
  es-toolkit: ^1.47.0
  immer: ^11.1.8
  lucide-react: ^1.17.0
  motion: ^12.40.0
  next: ^16.2.6
  posthog-js: ^1.376.5
  react: ^19.2.6
  react-dom: ^19.2.6
  react-redux: ^9.3.0
  redux-logger: ^3.0.6
  tailwind-merge: ^3.6.0
  tailwindcss: ^4.3.0
  tailwindcss-animate: ^1.0.7
  tsx: ^4.22.4
  typescript: ^6.0.3
  uuid: ^14.0.0
  vite: ^8.0.14
  vite-plugin-dts: ^5.0.1
  vitest: ^4.1.7
  wrangler: ^4.95.0
  zod: ^4.4.3
  zustand: ^5.0.14
overrides:
  react-resize-aware: 3.1.3
  cheerio: 1.0.0-rc.12
  immer: 'catalog:'
  'slate>immer': '^5.3.0'
  'slate-history>immer': '^5.3.0'
autoInstallPeers: true
linkWorkspacePackages: true
packageConfigs:
  network-canvas-interviewer:
    savePrefix: '~'
patchedDependencies:
  better-sqlite3-multiple-ciphers@12.9.0: patches/better-sqlite3-multiple-ciphers@12.9.0.patch
