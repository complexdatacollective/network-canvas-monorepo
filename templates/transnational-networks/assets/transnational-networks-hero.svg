<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" fill="none" role="img" aria-label="A network of personal ties spanning a home community and connections living abroad, drawn across a stylised globe.">
  <title>Transnational Networks</title>
  <defs>
    <linearGradient id="tn-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#272659" />
      <stop offset="1" stop-color="#1a1840" />
    </linearGradient>
    <linearGradient id="tn-tie" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00c38f" />
      <stop offset="0.5" stop-color="#13bde0" />
      <stop offset="1" stop-color="#0f6fff" />
    </linearGradient>
  </defs>

  <rect width="1200" height="460" rx="28" fill="url(#tn-bg)" />

  <!-- Stylised globe: latitude ellipses and meridian arcs -->
  <g stroke="#6359e0" stroke-opacity="0.28" fill="none" stroke-width="1.5">
    <ellipse cx="600" cy="230" rx="540" ry="196" />
    <ellipse cx="600" cy="230" rx="372" ry="196" />
    <ellipse cx="600" cy="230" rx="188" ry="196" />
    <line x1="64" y1="230" x2="1136" y2="230" />
    <path d="M600 34 C 360 110 360 350 600 426" />
    <path d="M600 34 C 840 110 840 350 600 426" />
  </g>

  <!-- Intra-community ties -->
  <g stroke="#6359e0" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round">
    <line x1="255" y1="235" x2="150" y2="135" />
    <line x1="255" y1="235" x2="135" y2="335" />
    <line x1="255" y1="235" x2="355" y2="140" />
    <line x1="255" y1="235" x2="330" y2="345" />
    <line x1="150" y1="135" x2="355" y2="140" />
    <line x1="945" y1="235" x2="1055" y2="140" />
    <line x1="945" y1="235" x2="1065" y2="340" />
    <line x1="945" y1="235" x2="845" y2="135" />
    <line x1="945" y1="235" x2="870" y2="350" />
    <line x1="1065" y1="340" x2="870" y2="350" />
  </g>

  <!-- Transnational bridging ties -->
  <g stroke="url(#tn-tie)" stroke-opacity="0.85" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M255 235 Q 600 36 945 235" />
    <path d="M355 140 Q 600 72 845 135" />
    <path d="M330 345 Q 600 438 870 350" />
    <path d="M255 235 Q 650 58 1055 140" />
    <path d="M135 335 Q 540 470 945 235" />
  </g>

  <!-- Node halos -->
  <g opacity="0.16">
    <circle cx="255" cy="235" r="46" fill="#00c38f" />
    <circle cx="150" cy="135" r="29" fill="#f1b700" />
    <circle cx="135" cy="335" r="25" fill="#f49324" />
    <circle cx="355" cy="140" r="25" fill="#78c25b" />
    <circle cx="330" cy="345" r="29" fill="#00c38f" />
    <circle cx="945" cy="235" r="42" fill="#13bde0" />
    <circle cx="1055" cy="140" r="27" fill="#0f6fff" />
    <circle cx="1065" cy="340" r="25" fill="#13bde0" />
    <circle cx="845" cy="135" r="25" fill="#6359e0" />
    <circle cx="870" cy="350" r="27" fill="#0f6fff" />
  </g>

  <!-- Nodes -->
  <g>
    <circle cx="255" cy="235" r="24" fill="#00c38f" />
    <circle cx="150" cy="135" r="15" fill="#f1b700" />
    <circle cx="135" cy="335" r="13" fill="#f49324" />
    <circle cx="355" cy="140" r="13" fill="#78c25b" />
    <circle cx="330" cy="345" r="15" fill="#00c38f" />
    <circle cx="945" cy="235" r="22" fill="#13bde0" />
    <circle cx="1055" cy="140" r="14" fill="#0f6fff" />
    <circle cx="1065" cy="340" r="13" fill="#13bde0" />
    <circle cx="845" cy="135" r="13" fill="#6359e0" />
    <circle cx="870" cy="350" r="14" fill="#0f6fff" />
  </g>

  <!-- Highlights -->
  <g fill="#f0f1f8" opacity="0.3">
    <circle cx="247" cy="227" r="6" />
    <circle cx="938" cy="227" r="5.5" />
  </g>
</svg>
