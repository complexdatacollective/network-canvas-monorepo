<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" fill="none" role="img" aria-label="A confidential timeline of a person's partnerships over time, with overlapping periods highlighted to show concurrency.">
  <title>Sexual and Injection Risk Networks</title>
  <defs>
    <linearGradient id="sr-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#223133" />
      <stop offset="1" stop-color="#18242b" />
    </linearGradient>
    <linearGradient id="sr-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#13bde0" />
      <stop offset="1" stop-color="#0f6fff" />
    </linearGradient>
  </defs>

  <rect width="1200" height="460" rx="28" fill="url(#sr-bg)" />

  <!-- Concurrency highlight bands (where partnerships overlap in time) -->
  <g fill="#f1b700" fill-opacity="0.14">
    <rect x="500" y="96" width="60" height="268" rx="10" />
    <rect x="680" y="96" width="80" height="268" rx="10" />
  </g>

  <!-- Time axis -->
  <g stroke="#6359e0" stroke-opacity="0.4">
    <line x1="90" y1="410" x2="1110" y2="410" stroke-width="2" stroke-linecap="round" />
    <g stroke-width="2" stroke-opacity="0.3">
      <line x1="250" y1="404" x2="250" y2="416" />
      <line x1="430" y1="404" x2="430" y2="416" />
      <line x1="610" y1="404" x2="610" y2="416" />
      <line x1="790" y1="404" x2="790" y2="416" />
      <line x1="970" y1="404" x2="970" y2="416" />
    </g>
  </g>

  <!-- Ties from the participant to each partnership -->
  <g stroke="#00c38f" stroke-opacity="0.5" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M120 230 Q 180 120 250 120" />
    <path d="M120 230 Q 250 170 430 170" />
    <path d="M120 230 Q 280 220 500 220" />
    <path d="M120 230 Q 350 270 680 270" />
    <path d="M120 230 Q 200 320 320 320" />
  </g>

  <!-- Partnership duration bars (start to end over time) -->
  <g stroke="url(#sr-bar)" stroke-width="13" stroke-linecap="round">
    <line x1="250" y1="120" x2="560" y2="120" />
    <line x1="430" y1="170" x2="760" y2="170" />
    <line x1="500" y1="220" x2="900" y2="220" />
    <line x1="680" y1="270" x2="1020" y2="270" />
    <line x1="320" y1="320" x2="470" y2="320" />
  </g>

  <!-- Partnership start / end markers -->
  <g fill="#13bde0">
    <circle cx="250" cy="120" r="9" />
    <circle cx="430" cy="170" r="9" />
    <circle cx="500" cy="220" r="9" />
    <circle cx="680" cy="270" r="9" />
    <circle cx="320" cy="320" r="9" />
  </g>
  <g fill="#0f6fff">
    <circle cx="560" cy="120" r="9" />
    <circle cx="760" cy="170" r="9" />
    <circle cx="900" cy="220" r="9" />
    <circle cx="1020" cy="270" r="9" />
    <circle cx="470" cy="320" r="9" />
  </g>

  <!-- Participant (ego) -->
  <circle cx="120" cy="230" r="34" fill="#00c38f" fill-opacity="0.16" />
  <circle cx="120" cy="230" r="22" fill="#00c38f" />
  <circle cx="112" cy="222" r="6" fill="#f0f1f8" opacity="0.4" />
</svg>
